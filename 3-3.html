<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Лабораторная работа №3 - Вертикальное меню с выпадающими подменю</title>
    <style>
        /* =============================================== */
        /* ЛАБОРАТОРНАЯ РАБОТА №3 - ЗАДАНИЕ 2              */
        /* Вертикальное меню с выпадающими подменю          */
        /* =============================================== */

        /* Обнуляем отступы для body */
        body {
            margin: 20px;
            font-family: Arial, sans-serif;
        }

        /* ОСНОВНОЕ МЕНЮ (вертикальное) */
        .menu {
            list-style: none;     /* убираем маркеры списка */
            padding: 0;           /* убираем внутренние отступы */
            margin: 0;            /* убираем внешние отступы */
            width: 250px;         /* ширина меню */
        }

        /* ПУНКТЫ ОСНОВНОГО МЕНЮ */
        .menu li {
            background: linear-gradient(to bottom, #d0d0d0, #b0b0b0);  /* градиентное закрашивание сверху вниз */
            border-bottom: 1px solid #999;  /* нижняя граница */
            font-weight: bold;              /* жирный шрифт */
        }

        /* ССЫЛКИ В ОСНОВНОМ МЕНЮ */
        .menu li a {
            display: block;        /* отображаем как блочный элемент (чтобы вся область была кликабельной) */
            padding: 10px 15px;    /* внутренние отступы */
            text-decoration: none; /* убираем подчеркивание */
            color: #333;           /* цвет текста */
        }

        /* ИЗМЕНЕНИЕ ФОНА ПРИ НАВЕДЕНИИ НА ПУНКТ МЕНЮ */
        .menu li:hover {
            background: linear-gradient(to bottom, #c0c0c0, #a0a0a0);  /* меняем фон при наведении */
        }

        /* ВЫПАДАЮЩЕЕ ПОДМЕНЮ (скрыто по умолчанию) */
        .submenu {
            list-style: none;      /* убираем маркеры */
            padding: 0;            /* убираем отступы */
            margin: 0;             /* убираем отступы */
            display: none;         /* скрываем подменю */
        }

        /* ПУНКТЫ ВЫПАДАЮЩЕГО ПОДМЕНЮ */
        .submenu li a {
            display: block;                 /* отображаем как блочный элемент */
            text-decoration: none;          /* убираем подчеркивание */
            color: #000;                    /* цвет текста */
            background-color: #f0f0f0;      /* фон подменю */
            border-bottom: 1px solid #ccc;  /* нижняя граница */
            font-weight: normal;            /* обычный шрифт (не жирный) */
            padding: 8px 10px 8px 40px;     /* увеличенный отступ слева для вложенности */
        }

        /* ИЗМЕНЕНИЕ ФОНА ПРИ НАВЕДЕНИИ НА ПУНКТ ПОДМЕНЮ */
        .submenu li a:hover {
            background-color: #e0e0e0;      /* меняем фон при наведении */
        }

        /* ОТОБРАЖАЕМ ПОДМЕНЮ ПРИ НАВЕДЕНИИ НА РОДИТЕЛЬСКИЙ ПУНКТ */
        .menu li:hover .submenu {
            display: block;        /* показываем подменю */
        }
    </style>
</head>
<body>
    <!-- ВЕРТИКАЛЬНОЕ МЕНЮ С ВЫПАДАЮЩИМИ ПОДМЕНЮ -->
    <ul class="menu">
        <!-- Пункт 1: ГЛАВНАЯ (с выпадающим подменю) -->
        <li>
            <a href="#">ГЛАВНАЯ</a>
            <ul class="submenu">
                <li><a href="#">Главная страница</a></li>
                <li><a href="#">Контакты</a></li>
                <li><a href="#">О нас</a></li>
            </ul>
        </li>
        
        <!-- Пункт 2: ОТДЕЛЫ ПРОДАЖ (без подменю) -->
        <li>
            <a href="#">ОТДЕЛЫ ПРОДАЖ</a>
        </li>
        
        <!-- Пункт 3: ПОСТАВЩИКИ (с выпадающим подменю) -->
        <li>
            <a href="#">ПОСТАВЩИКИ</a>
            <ul class="submenu">
                <li><a href="#">ООО "Дизайн"</a></li>
                <li><a href="#">ООО "Арт"</a></li>
                <li><a href="#">ООО "Фотостиль"</a></li>
            </ul>
        </li>
        
        <!-- Пункт 4: НАШИ УСЛУГИ (без подменю) -->
        <li>
            <a href="#">НАШИ УСЛУГИ</a>
        </li>
        
        <!-- Пункт 5: КОНТАКТЫ (без подменю) -->
        <li>
            <a href="#">КОНТАКТЫ</a>
        </li>
        
        <!-- Пункт 6: О НАС (без подменю) -->
        <li>
            <a href="#">О НАС</a>
        </li>
    </ul>
</body>
</html>
